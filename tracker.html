<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Live GPS Tracker - Legal & Real-time</title>
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            --danger: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            --warning: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        
        .header {
            text-align: center;
            color: white;
        }
        
        .header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            background: linear-gradient(45deg, #fff, #f0f8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 800;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 400px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        
        .btn {
            padding: 20px 30px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: var(--success);
            color: white;
            box-shadow: 0 10px 30px rgba(86, 171, 47, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(86, 171, 47, 0.6);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .location-card {
            width: 100%;
            padding: 30px;
            display: none;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }
        
        .coord-item {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .coord-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .coord-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .map-container {
            margin: 25px 0;
            height: 250px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .status {
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            margin: 15px 0;
            text-align: center;
        }
        
        .status.success { background: rgba(86, 171, 47, 0.2); color: #56ab2f; }
        .status.error { background: rgba(255, 65, 108, 0.2); color: #ff416c; }
        .status.loading { background: rgba(255, 193, 7, 0.2); color: #f39c12; }
        
        .share-section {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: none;
        }
        
        .share-btn {
            background: var(--warning);
            color: white;
            width: 100%;
            margin-top: 15px;
        }
        
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .coords-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Live GPS</h1>
            <p>Tracker lokasi real-time untuk perangkat Anda sendiri<br><small>100% Legal • Tidak perlu nomor HP</small></p>
        </div>
        
        <div class="controls glass">
            <button class="btn btn-primary" id="startBtn">
                🚀 Mulai Tracking
            </button>
            <button class="btn btn-secondary" id="stopBtn" disabled>
                ⏹️ Stop Tracking
            </button>
        </div>
        
        <div class="status loading" id="status">Siap untuk tracking...</div>
        
        <div class="location-card glass" id="locationCard">
            <div class="coords-grid">
                <div class="coord-item">
                    <div class="coord-label">Latitude</div>
                    <div class="coord-value" id="lat">-</div>
                </div>
                <div class="coord-item">
                    <div class="coord-label">Longitude</div>
                    <div class="coord-value" id="lon">-</div>
                </div>
            </div>
            
            <div class="coord-item">
                <div class="coord-label">Akurasi</div>
                <div class="coord-value" id="accuracy">-</div>
            </div>
            
            <div class="coord-item">
                <div class="coord-label">Kecepatan</div>
                <div class="coord-value" id="speed">-</div>
            </div>
            
            <div class="map-container">
                <iframe 
                    id="mapFrame" 
                    src="" 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    style="border:0; border-radius: 16px;"
                    allowfullscreen>
                </iframe>
            </div>
        </div>
        
        <div class="share-section glass" id="shareSection">
            <h3 style="margin-bottom: 15px; color: white;">📤 Bagikan Lokasi</h3>
            <input type="text" id="shareUrl" readonly class="btn btn-secondary" style="width: 100%; text-align: center;">
            <button class="btn share-btn" onclick="copyToClipboard()">📋 Copy Link</button>
        </div>
    </div>

    <script>
        let watchId = null;
        let isTracking = false;
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const locationCard = document.getElementById('locationCard');
        const shareSection = document.getElementById('shareSection');
        
        startBtn.addEventListener('click', startTracking);
        stopBtn.addEventListener('click', stopTracking);
        
        function startTracking() {
            if (!navigator.geolocation) {
                showStatus('❌ Geolocation tidak didukung', 'error');
                return;
            }
            
            isTracking = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.textContent = '🔄 Mendapatkan lokasi...';
            status.className = 'status loading';
            locationCard.style.display = 'block';
            shareSection.style.display = 'block';
            
            watchId = navigator.geolocation.watchPosition(
                updatePosition,
                handleError,
                {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 1000
                }
            );
        }
        
        function stopTracking() {
            isTracking = false;
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            startBtn.disabled = false;
            startBtn.textContent = '🚀 Mulai Tracking';
            stopBtn.disabled = true;
            status.textContent = '⏹️ Tracking dihentikan';
            status.className = 'status success';
        }
        
        function updatePosition(position) {
            const { latitude, longitude, accuracy, speed } = position.coords;
            
            document.getElementById('lat').textContent = latitude.toFixed(6);
            document.getElementById('lon').textContent = longitude.toFixed(6);
            document.getElementById('accuracy').textContent = accuracy.toFixed(0) + 'm';
            document.getElementById('speed').textContent = speed ? (speed * 3.6).toFixed(1) + ' km/jam' : '0 km/jam';
            
            // Update Google Maps
            const mapUrl = `https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509368!2d${longitude}!3d${latitude}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2z${latitude.toFixed(6)}%2C${longitude.toFixed(6)}!5e0!3m2!1sen!2sid!4v${Date.now()}!5m2!1sen!2sid`;
            document.getElementById('mapFrame').src = mapUrl;
            
            // Update share URL
            document.getElementById('shareUrl').value = `https://maps.google.com/?q=${latitude.toFixed(6)},${longitude.toFixed(6)}`;
            
            status.textContent = `✅ Lokasi terupdate ${new Date().toLocaleTimeString('id-ID')}`;
            status.className = 'status success';
        }
        
        function handleError(error) {
            let message = '';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = '❌ Izin lokasi ditolak';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = '❌ Lokasi tidak tersedia';
                    break;
                case error.TIMEOUT:
                    message = '⏰ Timeout - mencoba lagi...';
                    break;
                default:
                    message = '❌ Error tidak diketahui';
            }
            showStatus(message, 'error');
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
        }
        
        function copyToClipboard() {
            const shareUrl = document.getElementById('shareUrl');
            shareUrl.select();
            document.execCommand('copy');
            showStatus('✅ Link lokasi disalin!', 'success');
        }
        
        // Auto permission request
        if ('geolocation' in navigator) {
            navigator.permissions.query({name: 'geolocation'}).then(permission => {
                if (permission.state === 'granted') {
                    showStatus('✅ Izin lokasi sudah aktif', 'success');
                }
            });
        }
    </script>
</body>
</html>
